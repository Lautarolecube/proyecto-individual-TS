name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: proyecto-individual-TS-main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: proyecto-individual-TS-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck / build
        run: npm run build

      - name: Unit tests
        run: npm run test:run
